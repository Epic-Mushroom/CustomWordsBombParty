<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="custom words bombparty">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="icon" type="image/png" href="./images/brick.png">
    </head>
    <body class="menu">
        <div id="menu">
            <main>
                <section>
                    <label>Enter your username: </label>
                    <input type="text" id="username_field">
                    <button type="button" id="submit_username_button">OK</button>
                </section>
                <section>
                    <h2>Room Settings</h2>
                    <label for="max_players_field">Maximum players per room: </label>
                    <input type="text" id="max_players_field">
                    <br>
                    <label for="base_timer_duration_field">Base timer duration: </label>
                    <input type="text" id="base_timer_duration_field">
                    <br>
                    <label for="starting_lives_field">Starting lives: </label>
                    <input type="text" id="starting_lives_field">
                    <br>
                    Bonus alphabet: COMING SOON
                    <br><br>
                    <button type="button" id="create_room_button">Create a Room</button>
                    <br>
                    <button type="button" id="reset_rules_button">Default Rules</button>
                </section>
            </main>
        </div>

        <div id="active_rooms">
            <main>
                <ol id="active_rooms_list">
                </ol>
            </main>
        </div>

        <script src="./socket.io/socket.io.js"></script>
        <script type="module" src="./src/client.js"></script>
    </body>
</html>
