<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="custom words bombparty">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="icon" type="image/png" href="./images/brick.png">
    </head>
    <body class="menu-body">
        <div id="menu">
            <main>
                <section class="center-aligned-item username-entry">
                    <label for="username-field">Enter your username: </label>
                    <input type="text" id="username-field">
                    <button type="button" id="submit-username-button">OK</button>
                </section>
                <section id="room-settings">
                    <h2>Room Settings</h2>
                    <span><label for="max-players-field">Maximum players per room: </label>
                    <input type="text" id="max-players-field" class="number-input"></span>
                    <span><label for="base-timer-duration-field">Base bomb timer duration: </label>
                    <input type="text" id="base-timer-duration-field" class="number-input"></span>
                    <span><label for="starting-lives-field">Starting lives: </label>
                    <input type="text" id="starting-lives-field" class="number-input"></span>
                    <span>Bonus alphabet: COMING SOON</span>
                    <div id="newly-generated-code" class="room-code-info"></div>
                    <button type="button" id="create-room-button">Create a Room</button>
                    <button type="button" id="reset-rules-button">Default Rules</button>
                </section>
            </main>
        </div>

        <div id="active-rooms">
            <main>
                <div id="active-rooms-count"></div>
                <ol id="active-rooms-list"></ol>
            </main>
        </div>

        <script src="./socket.io/socket.io.js"></script>
        <script type="module" src="./src/client/homepage.js"></script>
    </body>
</html>
