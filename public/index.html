<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="custom words bombparty">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="icon" type="image/png" href="./images/brick.png">
    </head>
    <body class="menu-body page-body">
        <div id="menu">
            <main>
                <section class="center-aligned-item username-entry">
                    <label for="username-field">Enter your username: </label>
                    <input type="text" id="username-field">
                    <button type="button" id="submit-username-button">OK</button>
                </section>
                <h1 class="center-aligned-item">knockoff bombparty</h1>
                <section id="room-settings">
                    <h2>Room Settings</h2>
                    <span><label for="max-players-field">Maximum players per room: </label>
                    <input type="text" id="max-players-field" class="number-input"></span>
                    <span><label for="base-timer-duration-field">Base bomb timer duration: </label>
                    <input type="text" id="base-timer-duration-field" class="number-input"></span>
                    <span><label for="starting-lives-field">Starting lives: </label>
                    <input type="text" id="starting-lives-field" class="number-input"></span>
                    <span id="bonus-alphabet-checkboxes-container">
                        <span class="center-aligned-item">Bonus alphabet:</span><br>
                        <span><input type="checkbox" id="a-checkbox" checked class="checkbox-input"><label for="a-checkbox">A</label></span>
                        <span><input type="checkbox" id="b-checkbox" checked class="checkbox-input"><label for="b-checkbox">B</label></span>
                        <span><input type="checkbox" id="c-checkbox" checked class="checkbox-input"><label for="c-checkbox">C</label></span>
                        <span><input type="checkbox" id="d-checkbox" checked class="checkbox-input"><label for="d-checkbox">D</label></span>
                        <span><input type="checkbox" id="e-checkbox" checked class="checkbox-input"><label for="e-checkbox">E</label></span>
                        <span><input type="checkbox" id="f-checkbox" checked class="checkbox-input"><label for="f-checkbox">F</label></span>
                        <span><input type="checkbox" id="g-checkbox" checked class="checkbox-input"><label for="g-checkbox">G</label></span>
                        <span><input type="checkbox" id="h-checkbox" checked class="checkbox-input"><label for="h-checkbox">H</label></span>
                        <span><input type="checkbox" id="i-checkbox" checked class="checkbox-input"><label for="i-checkbox">I</label></span>
                        <span><input type="checkbox" id="j-checkbox" checked class="checkbox-input"><label for="j-checkbox">J</label></span>
                        <span><input type="checkbox" id="k-checkbox" checked class="checkbox-input"><label for="k-checkbox">K</label></span>
                        <span><input type="checkbox" id="l-checkbox" checked class="checkbox-input"><label for="l-checkbox">L</label></span>
                        <span><input type="checkbox" id="m-checkbox" checked class="checkbox-input"><label for="m-checkbox">M</label></span>
                        <span><input type="checkbox" id="n-checkbox" checked class="checkbox-input"><label for="n-checkbox">N</label></span>
                        <span><input type="checkbox" id="o-checkbox" checked class="checkbox-input"><label for="o-checkbox">O</label></span>
                        <span><input type="checkbox" id="p-checkbox" checked class="checkbox-input"><label for="p-checkbox">P</label></span>
                        <span><input type="checkbox" id="q-checkbox" checked class="checkbox-input"><label for="q-checkbox">Q</label></span>
                        <span><input type="checkbox" id="r-checkbox" checked class="checkbox-input"><label for="r-checkbox">R</label></span>
                        <span><input type="checkbox" id="s-checkbox" checked class="checkbox-input"><label for="s-checkbox">S</label></span>
                        <span><input type="checkbox" id="t-checkbox" checked class="checkbox-input"><label for="t-checkbox">T</label></span>
                        <span><input type="checkbox" id="u-checkbox" checked class="checkbox-input"><label for="u-checkbox">U</label></span>
                        <span><input type="checkbox" id="v-checkbox" checked class="checkbox-input"><label for="v-checkbox">V</label></span>
                        <span><input type="checkbox" id="w-checkbox" checked class="checkbox-input"><label for="w-checkbox">W</label></span>
                        <span><input type="checkbox" id="x-checkbox" class="checkbox-input"><label for="x-checkbox">X</label></span>
                        <span><input type="checkbox" id="y-checkbox" checked class="checkbox-input"><label for="y-checkbox">Y</label></span>
                        <span><input type="checkbox" id="z-checkbox" class="checkbox-input"><label for="z-checkbox">Z</label></span>
                    </span>
                    <span>
                        <button type="button" id="select-all-letters">Select All</button>
                        <button type="button" id="deselect-all-letters">Deselect All</button>
                    </span>
                    <span><label for="dictionary-dropdown">Dictionary: </label>
                    <select id="dictionary-dropdown" class="dropdown-input">
                        <option selected value="default-dictionary">Default English Dictionary</option>
                        <option value="cities">Cities of the World</option>
                        <option value="pokemon">Pokemon</option>
                        <option value="minecraft">Minecraft Items</option>
                        <option value="terraria">Terraria Items</option>
                        <option value="demons">Geometry Dash Demons</option>
                        <option value="custom-dictionary">Custom Words</option>
                    </select></span>
                    <div id="custom-words-settings" class="center-aligned-container">
                        <label for="custom-words-field">Custom words (separate with line break or commas): </label>
                        <textarea id="custom-words-field" rows="30" cols="25" class="long-form-input"></textarea>
                        <span><input type="checkbox" id="combine-with-default-dictionary" checked class="checkbox-input">
                        <label for="combine-with-default-dictionary">Combine custom words with default dictionary?</label></span>
                    </div>
                    <div id="newly-generated-code" class="room-code-info"></div>
                    <button type="button" id="create-room-button">Create a Room</button>
                    <button type="button" id="reset-rules-button">Default Rules</button>
                </section>
            </main>
        </div>

        <div id="active-rooms" class="center-aligned-item">
            <main>
                <div id="active-rooms-count"></div>
                <ol id="active-rooms-list"></ol>
            </main>
        </div>
        
        <script type="module" src="./src/client/homepage.js"></script>
    </body>
</html>
