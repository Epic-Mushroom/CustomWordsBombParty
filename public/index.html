<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="custom words bombparty">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="./styles/main.css">
        <link rel="icon" type="image/png" href="./images/brick.png">
    </head>
    <body>
        <div id="menu">
            <main>
                <button type="button" id="create_room_button">Create a Room</button>
                <p id="room_code_display"></p>
            </main>
        </div>

        <div id="active_rooms">
            <main>
                <ol id="active_rooms_list">
                </ol>
            </main>
        </div>

        <div id="game">
            <main>
                <h1>BombParty</h1>
                <h2>Substring: YYY</h2>

                <label for="guess">Enter guess:</label>
                <input type="text" id="guess" name="guess">
                <button type="button" id="submit_button">Enter</button>
            </main>
        </div>

        <script src="./socket.io/socket.io.js"></script>
        <script src="./src/client.js"></script>
    </body>
</html>
