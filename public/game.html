<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="BombParty from jklm.fun but you can upload your own custom words and stuff (game)">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="/styles/main.css">
        <link rel="icon" type="image/png" href="/images/brick.png">
    </head>
    <body class="game-body page-body" id="game-body">
        <div id="main-game">
            <div class="center-aligned-container" id="not-bonus-alphabet-container">
                <div id="room-code-container" class="room-code-info"></div>
                <section class="username-entry">
                    <label for="username-field">Enter your username: </label>
                    <input type="text" id="username-field">
                    <button type="button" id="submit-username-button">OK</button>
                </section>
                <h1>knockoff bombparty</h1>
                <section id="gameplay">
                    <h2 id="prompt-info-container">
                        Enter a word containing: 
                        <b id="substring">YYY</b>
                        <br>
                        <span id="time-left-container">
                            Time left: 
                            <span id="time-left">
                                0.0
                            </span>
                            s
                        </span>
                    </h2>
                    <div id="submit-guess">
                        <form id="submit-guess-form">
                            <label for="guess">Enter guess:</label>
                            <input type="text" id="guess" name="guess" autocomplete="off">
                            <button type="submit" id="submit-button">Enter</button>
                        </form>
                        
                    </div>
                    <div>
                        <span id="waiting-for-player">Waiting for ???</span>
                    </div>
                    <div>
                        <span id="winner">Winner is ???</span>
                    </div>
                </section>
                <section id="start-game">
                    <button type="button" id="start-game-button">Start Game</button>
                </section>
                <section id="player-info-container">
                    <!-- <h4>Players currently connected:</h4> -->
                    <ul id="player-info"></ul>
                </section>
            </div>
            <div id="bonus-alphabet-container">
                <!-- add divs with classes "unobtained-letter" or "obtained-letter" and id "letter-x"-->
            </div>
        </div>

        <div id="homepage-link-container">
            <a href="/" id="homepage-link">Go back to homepage</a>
        </div>

        <footer>
            <div id="footer-content">
                <span>made by EpicMushroom • </span>
                <a href="https://github.com/Epic-Mushroom/CustomWordsBombParty" target="_blank" rel="noopener noreferrer">source code</a>
                <span> • </span>
                <a href="https://jklm.fun/" target="_blank" rel="noopener noreferrer">original game by Sparklin Labs</a>
            </div>
        </footer>

        <script type="module" src="/src/client/game-page.js"></script>
    </body>
</html>
