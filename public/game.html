<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="custom words bombparty (game)">

        <title>Custom BombParty</title>
        <link rel="stylesheet" href="/styles/main.css">
        <link rel="icon" type="image/png" href="/images/brick.png">
    </head>
    <body class="game-body">
        <div id="main-game">
            <main class="center-aligned-container">
                <section class="username-entry">
                    <label for="username-field">Enter your username: </label>
                    <input type="text" id="username-field">
                    <button type="button" id="submit-username-button">OK</button>
                </section>
                <div id="room-code-container" class="room-code-info"></div>
                <h1>BombParty</h1>
                <section id="enter-guess">
                    <h2 id="substring">Substring: YYY</h2>

                    <label for="guess">Enter guess:</label>
                    <input type="text" id="guess" name="guess">
                    <button type="button" id="submit-button">Enter</button>
                </section>
                <section>
                    <h3>Players currently connected:</h3>
                    <ul id="player-info"></ul>
                </section>
            </main>
        </div>

        <a href="/">Go back to homepage</a>

        <script src="/socket.io/socket.io.js"></script>
        <script type="module" src="/src/client/game-page.js"></script>
    </body>
</html>
